name: Run Windows 22 Script on Release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Build
        run: |
          Start-Process -FilePath "./run.bat" -Wait -NoNewWindow
      - name: Upload Exe Files
        uses: actions/upload-artifact@v2
        with:
          name: Output Files
          path: ./Output
