name: Build and Release with Auto Tagging

on:
  workflow_dispatch:

permissions:
  contents: write # Needed for creating tags and releases

jobs:
  build-and-release:
    runs-on: windows-2025

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run build script
        run: |
          cmd /c run.bat

      - name: Retrieve and Create tag
        id: get_tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $tagDir = ".\tag"
          if (Test-Path $tagDir) {
            $tag = Get-ChildItem -Path $tagDir | Select-Object -First 1 | Select-Object -ExpandProperty Name
            if ($tag) {
              echo "Found tag: $tag"
              # Check if tag already exists on remote
              $existingTags = git ls-remote --tags origin "refs/tags/$tag" 2>$null
              if ($existingTags) {
                echo "Tag $tag already exists on remote - skipping release."
                echo "has_new_build=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              } else {
                echo "tag=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
                echo "has_new_build=true" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

                git config user.name "github-actions[bot]"
                git config user.email "github-actions[bot]@users.noreply.github.com"
                git tag $tag
                git push origin $tag
                echo "Tag created and pushed: $tag"
              }
            } else {
              echo "Error: Tag file found in $tagDir but is empty or unreadable."
              exit 1
            }
          } else {
            echo "No new version detected - skipping release."
            echo "has_new_build=false" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Debug builds folder
        if: env.has_new_build == 'true'
        shell: pwsh
        run: |
          dir builds
          if (Test-Path .\release_notes_body.md) {
            echo "Release notes file found."
            Get-Content .\release_notes_body.md | Select-Object -First 5
          } else {
            echo "WARNING: .\release_notes_body.md not found!"
          }

      - name: Upload binaries to GitHub Release
        if: env.has_new_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: builds/**/*
          tag_name: ${{ env.tag }}
          name: Easy MinGW Installer v${{ env.tag }}
          body_path: release_notes_body.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare logs on failure
        if: failure()
        shell: pwsh
        run: |
          $destinationDir = ".\logs"
          if (-not (Test-Path -Path $destinationDir)) {
              New-Item -ItemType Directory -Path $destinationDir
          }
          $logFiles = Get-ChildItem -Path . -Filter "*.log" -File
          foreach ($file in $logFiles) {
              Move-Item -Path $file.FullName -Destination $destinationDir
          }

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: logs
          path: logs/
